name = "star-catalog-upload"
main = "upload-worker.js"
compatibility_date = "2024-01-01"

# Set the Worker's URL route — update to match your domain
# routes = [{ pattern = "thestarcatalog.com/api/upload", zone_name = "thestarcatalog.com" }]

# Environment variables (non-secret — update as needed)
[vars]
R2_BUCKET     = "profilepics"
R2_ENDPOINT   = "https://d07c6c2a0d90a903fe5bb5641d5a29b2.r2.cloudflarestorage.com"
R2_PUBLIC_URL = "https://cdn.thestarcatalog.com"
ALLOWED_ORIGIN = "https://thestarcatalog.com,https://witchweekly.com,http://localhost:9000,http://localhost:3000,http://localhost:5500,http://127.0.0.1:9000,http://127.0.0.1:5500"

# Secret variables — set these via Wrangler CLI (never commit secrets to source control):
#   wrangler secret put R2_ACCESS_KEY_ID
#   wrangler secret put R2_SECRET_ACCESS_KEY
#
# When prompted, enter:
#   R2_ACCESS_KEY_ID      →  2f49fb1cbdd19e15281a54027782abb3
#   R2_SECRET_ACCESS_KEY  →  337c74cb44417a4cb4c308f5cc00a9463ef6aaae159765de4079d991ba8d72a0
